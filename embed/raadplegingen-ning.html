<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Raadplegingen</title>
<style>
  html,body{margin:0;padding:0;background:#faf7f5}
  #raadplegingen-iframe{width:100%;border:0;display:block;min-height:900px}
</style>
</head>
<body>
<!--
  Ning-wrapper voor de raadplegingen.
  Upload dit bestand in Bestandsbeheer en geef het de aangepaste koppeling:
      nederlanders.fr/raadplegingen
  De echte pagina draait op Vercel; dit bestand toont haar in een iframe en
  past de hoogte automatisch aan (geen afgekapte inhoud, geen lege ruimte).
-->
<iframe
  id="raadplegingen-iframe"
  src="https://poll-engine.vercel.app/raadplegingen"
  title="Raadplegingen"
  loading="lazy"></iframe>

<script>
  // Auto-hoogte: de Vercel-pagina meldt haar hoogte via postMessage.
  window.addEventListener('message', function (e) {
    if (e.origin !== 'https://poll-engine.vercel.app') return;
    var d = e.data || {};
    if (d.type === 'raadplegingen:height' && d.height) {
      var f = document.getElementById('raadplegingen-iframe');
      if (f) f.style.height = d.height + 'px';
    }
  });
</script>
</body>
</html>
